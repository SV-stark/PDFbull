name: Stable Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Rust cache
        uses: swatinem/rust-cache@v2

      - name: Run Tests
        run: cargo test

      - name: Build PDFbull (Release)
        run: cargo build --release

      - name: Prepare Release Artifacts
        shell: pwsh
        run: |
          mkdir release_dist
          Copy-Item -Path "target/release/pdfbull.exe" -Destination "release_dist/"
          Compress-Archive -Path release_dist/* -DestinationPath "PDFbull-Portable.zip"

      - name: Install NSIS
        shell: pwsh
        run: |
          choco install nsis -y --no-progress
          # Persist NSIS to PATH for all subsequent steps via GITHUB_PATH
          "C:\Program Files (x86)\NSIS" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Build NSIS Installer
        shell: pwsh
        run: |
          makensis installer.nsi
          if (-not (Test-Path "PDFbull-Setup.exe")) {
            Write-Error "PDFbull-Setup.exe was not produced by NSIS!"
            exit 1
          }
          Write-Host "Installer built successfully: $(Get-Item PDFbull-Setup.exe | Select-Object -ExpandProperty Length) bytes"

      - name: Create Stable Release
        uses: softprops/action-gh-release@v2
        with:
          name: Release ${{ github.ref_name }}
          body: 'Stable release of PDFbull.'
          fail_on_unmatched_files: true
          files: |
            release_dist/pdfbull.exe
            PDFbull-Setup.exe
            PDFbull-Portable.zip
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

