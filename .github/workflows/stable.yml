name: Stable Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Rust cache
        uses: swatinem/rust-cache@v2

      - name: Download Build Resources (PDFium)
        shell: pwsh
        run: |
          # Download PDFium (Required for pdfium-render)
          $pdfium_ver = "7763"
          $pdfium_url = "https://github.com/bblanchon/pdfium-binaries/releases/download/chromium%2F$pdfium_ver/pdfium-win-x64.tgz"
          Invoke-WebRequest -Uri $pdfium_url -OutFile pdfium.tgz
          tar -xzf pdfium.tgz
          Move-Item -Path "bin/pdfium.dll" -Destination "./pdfium.dll" -Force
          Remove-Item -Recurse -Force pdfium.tgz, bin, include, lib

      - name: Run Tests
        run: cargo test

      - name: Build PDFbull (Release)
        run: cargo build --release

      - name: Prepare Release Artifacts
        shell: pwsh
        run: |
          mkdir release_dist
          Copy-Item -Path "target/release/pdfbull.exe" -Destination "release_dist/"
          Copy-Item -Path "pdfium.dll" -Destination "release_dist/"
          Compress-Archive -Path release_dist/* -DestinationPath "PDFbull-Portable.zip"

      - name: Install NSIS
        shell: pwsh
        run: |
          choco install nsis -y --no-progress
          # Refresh PATH so makensis.exe is immediately available in subsequent steps
          $env:PATH = [System.Environment]::GetEnvironmentVariable("PATH", "Machine") + ";" + [System.Environment]::GetEnvironmentVariable("PATH", "User")
          echo "NSIS installed: $(makensis /VERSION)"

      - name: Build NSIS Installer
        shell: pwsh
        run: |
          # Ensure makensis is on PATH
          $nsisPath = "C:\Program Files (x86)\NSIS"
          if (Test-Path $nsisPath) { $env:PATH += ";$nsisPath" }
          makensis installer.nsi
          if (-not (Test-Path "PDFbull-Setup.exe")) {
            Write-Error "PDFbull-Setup.exe was not produced by NSIS!"
            exit 1
          }
          Write-Host "Installer built successfully: $(Get-Item PDFbull-Setup.exe | Select-Object -ExpandProperty Length) bytes"

      - name: Create Stable Release
        uses: softprops/action-gh-release@v2
        with:
          name: Release ${{ github.ref_name }}
          body: 'Stable release of PDFbull.'
          fail_on_unmatched_files: true
          files: |
            release_dist/pdfbull.exe
            release_dist/pdfium.dll
            PDFbull-Setup.exe
            PDFbull-Portable.zip
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

