[package]
name = "pdfbull"
version = "0.1.0"
description = "A lightweight PDF reader"
authors = ["SV-stark"]
edition = "2021"
license = "MIT"
homepage = "https://github.com/SV-stark/PDFbull"
repository = "https://github.com/SV-stark/PDFbull"
readme = "README.md"

[[bin]]
name = "pdfbull"
path = "src/main.rs"


[profile.release]
opt-level = "z"     # Optimize for size
lto = true          # Enable Link Time Optimization
codegen-units = 1   # Reduce parallel code generation for better optimization
panic = "abort"     # Remove panic unwinding
strip = true        # Strip symbols from binary

[dependencies]
rfd = "0.14"
pdfium-render = { git = "https://github.com/ajrcarey/pdfium-render.git", branch = "master" }
image = { version = "0.24", default-features = false, features = ["png"] }
iced = { version = "0.14", features = ["image", "canvas", "tokio"] }
tokio = { version = "1.43.0", features = ["rt", "time", "macros", "sync", "rt-multi-thread"] }
uuid = { version = "1", features = ["v4"] }
crossbeam-channel = "0.5"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
dirs = "5"
rayon = "1.10"
dark-light = "1.1"
log = "0.4"
env_logger = "0.11"
webbrowser = "1.2.0"
lru = "0.16.3"

[build-dependencies]
winresource = "0.1"
