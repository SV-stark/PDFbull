[package]
name = "pdfbull"
version = "0.1.0"
description = "A lightweight PDF reader"
authors = ["SV-stark"]
edition = "2021"
license = "MIT"
homepage = "https://github.com/SV-stark/PDFbull"
repository = "https://github.com/SV-stark/PDFbull"

[dependencies]
iced = { version = "0.13", features = ["image", "svg", "canvas", "tokio", "advanced"] }
pdfium-render = "0.8"
tokio = { version = "1.0", features = ["full"] }
rfd = "0.14"
image = "0.25"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
dirs = "5"
rayon = "1.10"
dark-light = "1.1"
log = "0.4"
env_logger = "0.11"
webbrowser = "1.2.0"
lru = "0.16.3"
thiserror = "1.0"

[build-dependencies]
winresource = "0.1"
